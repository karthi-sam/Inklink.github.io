<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Inklink</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f3f6;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #131921;
      padding: 10px 20px;
      color: white;
      flex-wrap: wrap;
      gap: 10px;
    }

    .logo {
      height: 40px;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      max-width: 500px;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    /* CATEGORY BAR */
    .categories {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px;
      background: white;
    }

    .cat-btn {
      padding: 8px 12px;
      border: none;
      background: #ddd;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
    }

    .cat-btn.active {
      background: #131921;
      color: white;
    }

    /* GRID */
    .container {
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
    }

    /* PRODUCT CARD */
    .product-card {
      background: white;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: 0.3s;
      text-align: center;
    }

    .product-card:hover {
      transform: scale(1.03);
    }

    .product-card img {
      width: 100%;
      height: 140px;
      object-fit: contain;
    }

    .product-card h3 {
      font-size: 13px;
      margin: 8px 0;
      color: #111;
      height: 35px;
      overflow: hidden;
    }

    .price {
      font-size: 16px;
      font-weight: bold;
      color: #B12704;
      margin: 8px 0;
    }

    .btn {
      background: #ffd814;
      color: black;
      padding: 6px 10px;
      text-decoration: none;
      border-radius: 5px;
      font-size: 12px;
      display: inline-block;
    }

    /* RESPONSIVE BREAKPOINTS */

    /* Tablet */
    @media (max-width: 768px) {
      .product-card img {
        height: 120px;
      }
    }

    /* Mobile */
    @media (max-width: 480px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .search-box {
        width: 100%;
      }

      .product-card img {
        height: 100px;
      }
    }

    /* TV / Large Screens */
    @media (min-width: 1400px) {
      .container {
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      }
    }

  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo.png" class="logo">
  <input id="searchInput" class="search-box" placeholder="Search products...">
</div>

<!-- CATEGORY BAR -->
<div class="categories" id="categoryContainer"></div>

<!-- PRODUCTS -->
<div class="container" id="productContainer"></div>

<script>

const sheetURL = "https://opensheet.elk.sh/1ZrM2WMuW0E3b9U4x0dAgOntlAkxhp1x0MAbBqw67OeM/Sheet1";

let allProducts = [];
let currentCategory = "All";

fetch(sheetURL)
.then(res => res.json())
.then(data => {
  allProducts = data;
  setupCategories(data);
  displayProducts(data);
});

/* CLEAN PRICE */
function cleanPrice(value) {
  if (!value) return 0;
  return Number(value.toString().replace(/[^0-9]/g, ""));
}

/* DISPLAY PRODUCTS */
function displayProducts(data) {

  const container = document.getElementById("productContainer");
  container.innerHTML = "";

  data.forEach(product => {

    const price = cleanPrice(product["Amazon Price"]);

    const card = `
      <div class="product-card">
        <img src="${product.Image || 'https://via.placeholder.com/300'}"
             onerror="this.src='https://via.placeholder.com/300'">

        <h3>${product.Name || 'No Name'}</h3>

        <div class="price">&#8377;${price || '-'}</div>

        <a class="btn" href="${product["Amazon Link"] || '#'}" target="_blank">
          Buy on Amazon
        </a>
      </div>
    `;

    container.innerHTML += card;
  });
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", function() {
  filterProducts();
});

/* CATEGORY SETUP */
function setupCategories(data) {
  const categories = ["All"];

  data.forEach(p => {
    if (p.Category && !categories.includes(p.Category)) {
      categories.push(p.Category);
    }
  });

  const container = document.getElementById("categoryContainer");

  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cat-btn";
    btn.innerText = cat;

    btn.onclick = () => {
      currentCategory = cat;
      document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      filterProducts();
    };

    container.appendChild(btn);
  });

  container.firstChild.classList.add("active");
}

/* FILTER LOGIC */
function filterProducts() {
  const search = document.getElementById("searchInput").value.toLowerCase();

  const filtered = allProducts.filter(p => {
    const matchName = (p.Name || "").toLowerCase().includes(search);
    const matchCategory = currentCategory === "All" || p.Category === currentCategory;
    return matchName && matchCategory;
  });

  displayProducts(filtered);
}

</script>

</body>
</html>
