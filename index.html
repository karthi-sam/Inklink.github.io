<!DOCTYPE html>
<html>
<head>
  <title>Deal Compare</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: white;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      background: #111;
      border-bottom: 1px solid #222;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      height: 40px;
    }

    .search-box {
      width: 40%;
      padding: 10px;
      border-radius: 25px;
      border: none;
      outline: none;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: center;
      gap: 25px;
      padding: 10px;
      background: #151515;
      border-bottom: 1px solid #222;
    }

    .navbar a {
      color: #ccc;
      text-decoration: none;
    }

    .navbar a:hover {
      color: white;
    }

    /* GRID */
    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    /* PRODUCT CARD */
    .product-card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .product-card:hover {
      transform: translateY(-5px);
    }

    .product-card img {
      width: 100%;
      border-radius: 10px;
    }

    .product-card h3 {
      margin: 10px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      text-align: center;
      font-size: 13px;
    }

    th {
      background: #222;
    }

    tr {
      border-bottom: 1px solid #333;
    }

    /* BUTTON */
    .btn {
      background: linear-gradient(45deg, #00c853, #00e676);
      color: black;
      padding: 5px 10px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
      font-size: 12px;
    }

    /* PRICE BAR */
    .bar-container {
      margin-top: 10px;
    }

    .bar {
      height: 18px;
      margin: 5px 0;
      font-size: 11px;
      padding-left: 5px;
      display: flex;
      align-items: center;
      border-radius: 5px;
    }

    .amazon { background: orange; }
    .flipkart { background: #2874f0; }

    /* RESPONSIVE */
    @media(max-width: 600px) {
      .search-box {
        width: 60%;
      }
    }

  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="brand">
    <img src="logo.png" class="logo">
    <h2>Deal Compare</h2>
  </div>

  <input id="searchInput" class="search-box" type="text" placeholder="Search products...">
</div>

<!-- NAVBAR -->
<div class="navbar">
  <a href="#">Electronics</a>
  <a href="#">Mobiles</a>
  <a href="#">Fashion</a>
  <a href="#">Home</a>
  <a href="#">Deals</a>
</div>

<!-- PRODUCTS -->
<div class="container" id="productContainer"></div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/1ZrM2WMuW0E3b9U4x0dAgOntlAkxhp1x0MAbBqw67OeM/edit?usp=sharing";

let allProducts = [];

fetch(sheetURL)
  .then(res => res.json())
  .then(data => {
    allProducts = data;
    displayProducts(data);
  });

function displayProducts(data) {

  const container = document.getElementById("productContainer");
  container.innerHTML = "";

  data.forEach(product => {

    const amazon = parseInt(product["Amazon Price"]);
    const flipkart = parseInt(product["Flipkart Price"]);

    const maxPrice = Math.max(amazon, flipkart);

    const amazonWidth = (amazon / maxPrice) * 100;
    const flipkartWidth = (flipkart / maxPrice) * 100;

    const card = `
      <div class="product-card">
        <img src="${product.Image}">
        <h3>${product.Name}</h3>

        <table>
          <tr>
            <th>Platform</th>
            <th>Price</th>
            <th>Buy</th>
          </tr>

          <tr>
            <td>Amazon</td>
            <td>₹${amazon}</td>
            <td><a class="btn" href="${product["Amazon Link"]}" target="_blank">Buy</a></td>
          </tr>

          <tr>
            <td>Flipkart</td>
            <td>₹${flipkart}</td>
            <td><a class="btn" href="${product["Flipkart Link"]}" target="_blank">Buy</a></td>
          </tr>
        </table>

        <div class="bar-container">
          <div class="bar amazon" style="width:${amazonWidth}%">
            Amazon ₹${amazon}
          </div>

          <div class="bar flipkart" style="width:${flipkartWidth}%">
            Flipkart ₹${flipkart}
          </div>
        </div>

      </div>
    `;

    container.innerHTML += card;

  });
}

/* SEARCH FUNCTION */
document.getElementById("searchInput").addEventListener("input", function() {

  const value = this.value.toLowerCase();

  const filtered = allProducts.filter(p =>
    p.Name.toLowerCase().includes(value)
  );

  displayProducts(filtered);

});

</script>

</body>
</html>
