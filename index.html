<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inklink</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #f1f3f6;
}

/* HEADER */
.header {
  display: flex;
  gap: 10px;
  background: #131921;
  padding: 10px;
}

.logo { height: 35px; }

.search-box {
  flex: 1;
  padding: 10px;
  border-radius: 6px;
  border: none;
}

/* CATEGORY */
.categories {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 10px;
  background: white;
}

.cat-btn {
  padding: 6px 12px;
  border-radius: 20px;
  border: none;
  background: #ddd;
  cursor: pointer;
}

.cat-btn.active {
  background: #131921;
  color: white;
}

/* GRID */
.container {
  padding: 15px;
  display: grid;
  gap: 15px;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
}

/* CARD */
.product-card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

.product-card img {
  width: 100%;
  height: 140px;
  object-fit: contain;
}

.price {
  color: #B12704;
  font-weight: bold;
}

/* POPUP */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  width: 90%;
  max-width: 500px;
  padding: 15px;
  border-radius: 10px;
}

.close {
  float: right;
  cursor: pointer;
}

/* SLIDER */
.slider { overflow: hidden; }

.slides {
  display: flex;
  transition: 0.3s;
}

.slides img {
  width: 100%;
  height: 200px;
  object-fit: contain;
}

.btn {
  background: #ffd814;
  padding: 8px;
  display: inline-block;
  margin-top: 10px;
  text-decoration: none;
  color: black;
  border-radius: 5px;
}

</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <input id="searchInput" class="search-box" placeholder="Search...">
</div>

<!-- CATEGORY BAR -->
<div class="categories" id="categoryContainer"></div>

<div class="container" id="productContainer"></div>

<!-- POPUP -->
<div class="modal" id="productModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>

    <div class="slider">
      <div class="slides" id="modalSlides"></div>
    </div>

    <h3 id="modalTitle"></h3>
    <div id="modalPrice"></div>
    <p id="modalDesc"></p>

    <a id="modalLink" class="btn" target="_blank">Buy on Amazon</a>
  </div>
</div>

<script>

const sheetURL = "https://opensheet.elk.sh/1ZrM2WMuW0E3b9U4x0dAgOntlAkxhp1x0MAbBqw67OeM/Sheet1";

let allProducts = [];
let currentCategory = "All";

fetch(sheetURL)
.then(res => res.json())
.then(data => {
  allProducts = data;
  setupCategories(data);
  displayProducts(data);
});

function cleanPrice(v){
  return Number((v || "").toString().replace(/[^0-9]/g,""));
}

/* DISPLAY PRODUCTS */
function displayProducts(data){
  const container = document.getElementById("productContainer");
  container.innerHTML = "";

  data.forEach((p,i)=>{
    const price = cleanPrice(p["Amazon Price"]);
    const images = (p.Image || "").split("|");

    container.innerHTML += `
      <div class="product-card" onclick="openModal(${i})">
        <img src="${images[0]}" onerror="this.src='https://via.placeholder.com/300'">
        <h4>${p.Name}</h4>
        <div class="price">₹${price}</div>
      </div>
    `;
  });
}

/* CATEGORY SETUP */
function setupCategories(data){
  const categories = ["All"];

  data.forEach(p=>{
    if(p.Category && !categories.includes(p.Category)){
      categories.push(p.Category);
    }
  });

  const container = document.getElementById("categoryContainer");

  categories.forEach(cat=>{
    const btn = document.createElement("button");
    btn.className = "cat-btn";
    btn.innerText = cat;

    btn.onclick = ()=>{
      currentCategory = cat;

      document.querySelectorAll(".cat-btn")
      .forEach(b=>b.classList.remove("active"));

      btn.classList.add("active");

      filterProducts();
    };

    container.appendChild(btn);
  });

  container.firstChild.classList.add("active");
}

/* FILTER */
function filterProducts(){
  const search = document.getElementById("searchInput").value.toLowerCase();

  const filtered = allProducts.filter(p=>{
    const matchName = (p.Name || "").toLowerCase().includes(search);
    const matchCategory = currentCategory==="All" || p.Category===currentCategory;
    return matchName && matchCategory;
  });

  displayProducts(filtered);
}

/* POPUP */
function openModal(i){
  const p = allProducts[i];
  const images = (p.Image || "").split("|");

  document.getElementById("modalSlides").innerHTML =
    images.map(img=>`<img src="${img}">`).join("");

  document.getElementById("modalTitle").innerText = p.Name;
  document.getElementById("modalPrice").innerText = "₹" + cleanPrice(p["Amazon Price"]);
  document.getElementById("modalDesc").innerText = p.Description || "";
  document.getElementById("modalLink").href = p["Amazon Link"];

  document.getElementById("productModal").style.display="flex";
}

function closeModal(){
  document.getElementById("productModal").style.display="none";
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", filterProducts);

</script>

</body>
</html>
