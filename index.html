<!DOCTYPE html>
<html>
<head>
  <title>My Affiliate Website</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      text-align: center;
    }

    h1 {
      background-color: #222;
      color: white;
      padding: 15px;
    }

    .product {
      background: white;
      margin: 20px auto;
      padding: 20px;
      width: 350px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    .product img {
      width: 200px;
      height: auto;
    }

    table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    th {
      background-color: #f0f0f0;
    }

    .btn {
      padding: 8px 12px;
      background-color: green;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    /* Simple price bar chart */
    .bar-container {
      text-align: left;
      margin-top: 10px;
    }

    .bar {
      height: 20px;
      margin: 5px 0;
      color: white;
      padding-left: 5px;
    }

    .amazon { background-color: orange; }
    .flipkart { background-color: blue; }
  </style>

</head>

<body>

<h1>Product Comparison Website</h1>

<div class="product">

  <h2>iPhone 15</h2>

  <!-- Product Image -->
  <img src="https://via.placeholder.com/200" alt="iPhone 15">

  <!-- Price Table -->
  <table>
    <tr>
      <th>Platform</th>
      <th>Price</th>
      <th>Buy</th>
    </tr>

    <tr>
      <td>Amazon</td>
      <td>₹70,000</td>
      <td><a class="btn" href="YOUR_AMAZON_AFFILIATE_LINK">Buy</a></td>
    </tr>

    <tr>
      <td>Flipkart</td>
      <td>₹69,500</td>
      <td><a class="btn" href="YOUR_FLIPKART_AFFILIATE_LINK">Buy</a></td>
    </tr>

  </table>

  <!-- Simple Price Comparison Chart -->
  <div class="bar-container">
    <p><strong>Price Comparison</strong></p>

    <div class="bar amazon" style="width: 100%;">
      Amazon ₹70,000
    </div>

    <div class="bar flipkart" style="width: 99%;">
      Flipkart ₹69,500
    </div>

  </div>

</div>

</body>
</html>
