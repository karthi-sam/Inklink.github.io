<!DOCTYPE html>
<html>
<head>
  <title>Deal Compare</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: white;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      background: #111;
      border-bottom: 1px solid #222;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand h2 {
      margin: 0;
      font-size: 18px;
      color: #fff;
    }

    .logo {
      height: 40px;
    }

    .search-box {
      width: 40%;
      padding: 10px;
      border-radius: 25px;
      border: none;
      outline: none;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: center;
      gap: 25px;
      padding: 10px;
      background: #151515;
      border-bottom: 1px solid #222;
    }

    .navbar a {
      color: #ccc;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .navbar a:hover {
      color: white;
    }

    /* GRID */
    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    /* PRODUCT CARD */
    .product-card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 12px;
      transition: 0.3s;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .product-card:hover {
      transform: translateY(-5px);
    }

    .product-card img {
      width: 100%;
      border-radius: 10px;
    }

    .product-card h3 {
      margin: 10px 0;
      font-size: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 8px;
      font-size: 13px;
      text-align: center;
    }

    th {
      background: #222;
    }

    tr {
      border-bottom: 1px solid #333;
    }

    /* BUTTON */
    .btn {
      background: linear-gradient(45deg, #00c853, #00e676);
      color: black;
      padding: 5px 10px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
      font-size: 12px;
    }

    .btn:hover {
      opacity: 0.8;
    }

    /* PRICE BAR */
    .bar-container {
      margin-top: 10px;
    }

    .bar {
      height: 18px;
      margin: 5px 0;
      font-size: 11px;
      padding-left: 5px;
      display: flex;
      align-items: center;
      border-radius: 5px;
    }

    .amazon { background: orange; }
    .flipkart { background: #2874f0; }

    /* RESPONSIVE */
    @media(max-width: 600px) {
      .search-box {
        width: 60%;
      }
    }

  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="brand">
    <img src="logo.png" class="logo">
    <h2>Deal Compare</h2>
  </div>

  <input class="search-box" type="text" placeholder="Search products...">

</div>

<!-- NAVBAR -->
<div class="navbar">
  <a href="#">Electronics</a>
  <a href="#">Mobiles</a>
  <a href="#">Fashion</a>
  <a href="#">Home</a>
  <a href="#">Deals</a>
</div>

<!-- PRODUCTS -->
<div class="container">

  <!-- PRODUCT 1 -->
  <div class="product-card">
    <img src="https://via.placeholder.com/300">
    <h3>iPhone 15</h3>

    <table>
      <tr>
        <th>Platform</th>
        <th>Price</th>
        <th>Buy</th>
      </tr>

      <tr>
        <td>Amazon</td>
        <td>₹70,000</td>
        <td><a class="btn" href="#">Buy</a></td>
      </tr>

      <tr>
        <td>Flipkart</td>
        <td>₹69,500</td>
        <td><a class="btn" href="#">Buy</a></td>
      </tr>
    </table>

    <div class="bar-container">
      <div class="bar amazon" style="width:100%">Amazon ₹70k</div>
      <div class="bar flipkart" style="width:99%">Flipkart ₹69.5k</div>
    </div>
  </div>

  <!-- PRODUCT 2 -->
  <div class="product-card">
    <img src="https://via.placeholder.com/300">
    <h3>Noise Smartwatch</h3>

    <table>
      <tr>
        <td>Amazon</td>
        <td>₹2,999</td>
        <td><a class="btn" href="#">Buy</a></td>
      </tr>

      <tr>
        <td>Flipkart</td>
        <td>₹2,799</td>
        <td><a class="btn" href="#">Buy</a></td>
      </tr>
    </table>

    <div class="bar-container">
      <div class="bar amazon" style="width:100%">Amazon ₹2999</div>
      <div class="bar flipkart" style="width:93%">Flipkart ₹2799</div>
    </div>
  </div>

</div>

</body>
</html>
