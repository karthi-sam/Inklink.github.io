<!DOCTYPE html>
<html>
<head>
  <title>Deal Compare</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111;
      color: white;
      padding: 10px 20px;
    }

    .logo {
      height: 50px;
    }

    .search-box {
      width: 40%;
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    /* NAVBAR */
    .navbar {
      background: white;
      padding: 10px;
      display: flex;
      justify-content: center;
      gap: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .navbar a {
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }

    /* PRODUCT GRID */
    .container {
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .product-card {
      background: white;
      width: 350px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .product-card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      font-size: 18px;
      margin: 10px 0;
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #f0f0f0;
    }

    .btn {
      background: green;
      color: white;
      padding: 6px 10px;
      text-decoration: none;
      border-radius: 5px;
    }

    /* PRICE BAR */
    .bar-container {
      margin-top: 15px;
    }

    .bar {
      height: 20px;
      margin: 5px 0;
      color: white;
      padding-left: 5px;
      font-size: 12px;
    }

    .amazon { background: orange; }
    .flipkart { background: #2874f0; }

  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <input class="search-box" type="text" placeholder="Search products...">

  <!-- LOGO RIGHT SIDE -->
  <img src="logo.png" class="logo">
</div>

<!-- NAVBAR -->
<div class="navbar">
  <a href="#">Electronics</a>
  <a href="#">Mobiles</a>
  <a href="#">Fashion</a>
  <a href="#">Home</a>
  <a href="#">Deals</a>
</div>

<!-- PRODUCT SECTION -->
<div class="container">

  <div class="product-card">

    <h2>iPhone 15</h2>

    <img src="https://via.placeholder.com/300" alt="iPhone 15">

    <!-- PRICE TABLE -->
    <table>
      <tr>
        <th>Platform</th>
        <th>Price</th>
        <th>Buy</th>
      </tr>

      <tr>
        <td>Amazon</td>
        <td>₹70,000</td>
        <td><a class="btn" href="#">Buy</a></td>
      </tr>

      <tr>
        <td>Flipkart</td>
        <td>₹69,500</td>
        <td><a class="btn" href="#">Buy</a></td>
      </tr>

    </table>

    <!-- PRICE CHART -->
    <div class="bar-container">
      <p><strong>Price Comparison</strong></p>

      <div class="bar amazon" style="width:100%">
        Amazon ₹70,000
      </div>

      <div class="bar flipkart" style="width:99%">
        Flipkart ₹69,500
      </div>
    </div>

  </div>

</div>

</body>
</html>
