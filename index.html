<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Inklink</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f3f6;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #131921;
      padding: 10px 20px;
      color: white;
    }

    .logo {
      height: 40px;
    }

    .search-box {
      width: 50%;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    /* GRID */
    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    /* PRODUCT CARD */
    .product-card {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: 0.3s;
      text-align: center;
    }

    .product-card:hover {
      transform: scale(1.03);
    }

    .product-card img {
      width: 100%;
      height: 180px;
      object-fit: contain;
    }

    .product-card h3 {
      font-size: 14px;
      margin: 10px 0;
      color: #111;
      height: 40px;
      overflow: hidden;
    }

    .price {
      font-size: 18px;
      font-weight: bold;
      color: #B12704;
      margin: 10px 0;
    }

    .btn {
      background: #ffd814;
      color: black;
      padding: 8px 12px;
      text-decoration: none;
      border-radius: 5px;
      font-size: 13px;
      display: inline-block;
      margin-top: 5px;
    }

    .btn:hover {
      background: #f7ca00;
    }

  </style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <input id="searchInput" class="search-box" placeholder="Search products...">
</div>

<div class="container" id="productContainer"></div>

<script>

const sheetURL = "https://opensheet.elk.sh/1ZrM2WMuW0E3b9U4x0dAgOntlAkxhp1x0MAbBqw67OeM/Sheet1";

let allProducts = [];

fetch(sheetURL)
.then(res => res.json())
.then(data => {
  allProducts = data;
  displayProducts(data);
});

function cleanPrice(value) {
  if (!value) return 0;
  return Number(value.toString().replace(/[^0-9]/g, ""));
}

function displayProducts(data) {

  const container = document.getElementById("productContainer");
  container.innerHTML = "";

  data.forEach(product => {

    const amazon = cleanPrice(product["Amazon Price"]);

    const card = `
      <div class="product-card">

        <img src="${product.Image || 'https://via.placeholder.com/300'}"
             onerror="this.src='https://via.placeholder.com/300'">

        <h3>${product.Name || 'No Name'}</h3>

        <div class="price">
          &#8377;${amazon || '-'}
        </div>

        <a class="btn" href="${product["Amazon Link"] || '#'}" target="_blank">
          Buy on Amazon
        </a>

      </div>
    `;

    container.innerHTML += card;

  });

}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", function() {
  const value = this.value.toLowerCase();

  const filtered = allProducts.filter(p =>
    (p.Name || "").toLowerCase().includes(value)
  );

  displayProducts(filtered);
});

</script>

</body>
</html>
