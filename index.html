<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inklink</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f3f6;
    }

    /* HEADER */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #131921;
      padding: 10px 15px;
    }

    .logo { height: 35px; }

    .search-box {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    /* CATEGORY */
    .categories {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px;
      background: white;
    }

    .cat-btn {
      padding: 8px 14px;
      border: none;
      background: #ddd;
      border-radius: 20px;
      cursor: pointer;
    }

    .cat-btn.active {
      background: #131921;
      color: white;
    }

    /* GRID */
    .container {
      padding: 15px;
      display: grid;
      gap: 15px;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    }

    /* PRODUCT */
    .product-card {
      background: white;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .product-card img {
      width: 100%;
      height: 140px;
      object-fit: contain;
    }

    .dots {
      margin: 5px 0;
    }

    .dot {
      cursor: pointer;
      font-size: 12px;
      margin: 0 2px;
    }

    .product-card h3 {
      font-size: 13px;
      height: 36px;
      overflow: hidden;
    }

    .price {
      font-size: 16px;
      font-weight: bold;
      color: #B12704;
    }

    .btn {
      background: #ffd814;
      padding: 6px 10px;
      border-radius: 5px;
      text-decoration: none;
      color: black;
      font-size: 12px;
      display: inline-block;
      margin-top: 5px;
    }

  </style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <input id="searchInput" class="search-box" placeholder="Search products...">
</div>

<div class="categories" id="categoryContainer"></div>

<div class="container" id="productContainer"></div>

<script>

const sheetURL = "https://opensheet.elk.sh/1ZrM2WMuW0E3b9U4x0dAgOntlAkxhp1x0MAbBqw67OeM/Sheet1";

let allProducts = [];
let currentCategory = "All";

fetch(sheetURL)
.then(res => res.json())
.then(data => {
  allProducts = data;
  setupCategories(data);
  displayProducts(data);
});

function cleanPrice(value) {
  if (!value) return 0;
  return Number(value.toString().replace(/[^0-9]/g, ""));
}

function displayProducts(data) {
  const container = document.getElementById("productContainer");
  container.innerHTML = "";

  data.forEach(product => {

    const price = cleanPrice(product["Amazon Price"]);

    const images = (product.Image || "").split("|");

    let imageId = "img-" + product.Name.replace(/\s/g, "");

    let dots = images.map(img => `
      <span class="dot" onclick="changeImage('${imageId}','${img}')">●</span>
    `).join("");

    container.innerHTML += `
      <div class="product-card">

        <img id="${imageId}" src="${images[0] || 'https://via.placeholder.com/300'}"
             onerror="this.src='https://via.placeholder.com/300'">

        <div class="dots">${dots}</div>

        <h3>${product.Name}</h3>

        <div class="price">&#8377;${price}</div>

        <a class="btn" href="${product["Amazon Link"]}" target="_blank">
          Buy on Amazon
        </a>

      </div>
    `;
  });
}

function changeImage(id, src) {
  document.getElementById(id).src = src;
}

function setupCategories(data) {
  const categories = ["All"];

  data.forEach(p => {
    if (p.Category && !categories.includes(p.Category)) {
      categories.push(p.Category);
    }
  });

  const container = document.getElementById("categoryContainer");

  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cat-btn";
    btn.innerText = cat;

    btn.onclick = () => {
      currentCategory = cat;
      document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      filterProducts();
    };

    container.appendChild(btn);
  });

  container.firstChild.classList.add("active");
}

function filterProducts() {
  const search = document.getElementById("searchInput").value.toLowerCase();

  const filtered = allProducts.filter(p => {
    const matchName = (p.Name || "").toLowerCase().includes(search);
    const matchCategory = currentCategory === "All" || p.Category === currentCategory;
    return matchName && matchCategory;
  });

  displayProducts(filtered);
}

document.getElementById("searchInput").addEventListener("input", filterProducts);

</script>

</body>
</html>
